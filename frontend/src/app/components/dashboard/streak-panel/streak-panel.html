<p-card header="Learning Streak">
  <div class="flex flex-col items-center gap-4 text-center">
    @if (data().currentStreak > 0) {
      <div>
        <div class="text-4xl font-bold text-orange-500">{{ data().currentStreak }} Days</div>
        <p-tag severity="success" value="Active Streak"></p-tag>
      </div>
    } @else {
      <div>
        <div class="text-2xl text-gray-400">No active streak</div>
        <p-tag severity="danger" value="Start learning today!"></p-tag>
      </div>
    }

    <div class="text-sm text-gray-500">Longest streak: {{ data().longestStreak }} days</div>
  </div>
</p-card>

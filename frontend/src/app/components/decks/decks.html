<p-table [value]="deckSummaries()" dataKey="id" selectionMode="single" [(selection)]="selectedDeck"
  (onRowSelect)="onRowSelect()">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Total Cards</th>
      <th>New Cards</th>
      <th>Due Cards</th>
      <th>Public?</th>
      <th>Delete</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-deck>
    <tr [pSelectableRow]="deck">
      <td>{{ deck.name }}</td>
      <td>{{ deck.totalCards }}</td>
      <td>{{ deck.newCards }}</td>
      <td>{{ deck.dueCards }}</td>
      <td>
        <p-toggleswitch [(ngModel)]="deck.isPublished" (onChange)="onTogglePublished(deck)" />
      </td>
      <td>
        <p-button icon="pi pi-trash" />
      </td>
  
    </tr>
  </ng-template>
</p-table>

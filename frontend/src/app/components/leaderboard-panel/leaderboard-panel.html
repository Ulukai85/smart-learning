<p-card header="Top Learners">
  <p-table [value]="displayedEntries()" [tableStyle]="{ 'min-width': '100%' }">
    <ng-template pTemplate="body" let-row>
      <tr [ngClass]="{ 'font-semibold': row.isCurrentUser }">
        <td>{{ row.rank }}</td>
        <td>{{ row.username }}</td>
        <td>{{ row.totalXp }} XP</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
